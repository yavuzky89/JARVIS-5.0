<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Personal AI</title>
    <style>
        :root {
            --glow-color: #00d4ff;
            --bg-color: #050505;
        }

        body {
            background-color: var(--bg-color);
            color: var(--glow-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Arka Plan Izgarası */
        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg);
            animation: moveGrid 10s linear infinite;
        }

        @keyframes moveGrid {
            from { transform: perspective(500px) rotateX(60deg) translateY(0); }
            to { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* Ana Reaktör Animasyonu */
        .reactor-container {
            width: 200px;
            height: 200px;
            border: 2px solid var(--glow-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--glow-color);
            animation: pulse 2s infinite alternate;
        }

        .inner-circle {
            width: 140px;
            height: 140px;
            border: 4px dashed var(--glow-color);
            border-radius: 50%;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            from { opacity: 0.6; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1.02); }
        }

        /* Mesaj Alanı */
        #chat-window {
            width: 80%;
            max-width: 600px;
            height: 150px;
            margin-top: 50px;
            padding: 20px;
            border-left: 3px solid var(--glow-color);
            background: rgba(0, 212, 255, 0.05);
            overflow-y: auto;
        }

        /* Giriş Çubuğu */
        .input-area {
            margin-top: 20px;
            width: 80%;
            max-width: 600px;
            display: flex;
        }

        input {
            flex-grow: 1;
            background: transparent;
            border: 1px solid var(--glow-color);
            padding: 10px;
            color: white;
            outline: none;
        }

        button {
            background: var(--glow-color);
            color: black;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .status-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 12px;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="grid"></div>

    <div class="status-panel">
        <p>SİSTEM: ÇEVRİMİÇİ</p>
        <p>GÜÇ: 98%</p>
        <p>KONUM: ISTANBUL / CEKMEKOY</p>
    </div>

    <div class="reactor-container">
        <div class="inner-circle"></div>
    </div>

    <div id="chat-window">
        <div id="output">Jarvis: Emirlerinizi bekliyorum, efendim.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Mesajınızı yazın...">
        <button onclick="sendMessage()">GÖNDER</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const output = document.getElementById('output');
            const message = input.value;

            if (!message) return;

            output.innerHTML += `<br><b>Siz:</b> ${message}`;
            input.value = '';

            // Burada Gemini API entegrasyonunu yapacaksın
            // API anahtarını güvenliğin için doğrudan buraya yazma
            // Backend üzerinden yönlendirmen daha sağlıklı olur.
            
            output.innerHTML += `<br><i>Jarvis işliyor...</i>`;
        }
    </script>
</body>
</html>
