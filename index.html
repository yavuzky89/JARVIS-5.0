<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS Mobile</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; color: #00d4ff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
        }
        
        /* Mobil HUD Tasarımı */
        .header {
            padding: 15px; border-bottom: 1px solid #00d4ff44;
            text-align: center; font-size: 12px; letter-spacing: 2px;
            background: rgba(0, 212, 255, 0.05);
        }

        #chat-flow {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .bubble {
            max-width: 85%; padding: 10px 15px; border-radius: 15px;
            font-size: 14px; line-height: 1.4;
        }

        .user { align-self: flex-end; background: #00d4ff22; border: 1px solid #00d4ff; color: #fff; }
        .jarvis { align-self: flex-start; background: #111; border-left: 3px solid #00d4ff; }

        .input-area {
            padding: 15px; background: #080808; border-top: 1px solid #00d4ff44;
            display: flex; gap: 10px;
        }

        input {
            flex: 1; background: #111; border: 1px solid #00d4ff;
            color: #fff; padding: 12px; border-radius: 25px; outline: none;
        }

        button {
            background: #00d4ff; border: none; width: 45px; height: 45px;
            border-radius: 50%; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header">SYSTEM STATUS: ACTIVE | LOC: ISTANBUL</div>

<div id="chat-flow">
    <div class="bubble jarvis">Emret Yavuz Selim, seni dinliyorum.</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Mesaj yazın..." onkeypress="if(event.key === 'Enter') bootJarvis()">
    <button onclick="bootJarvis()">></button>
</div>

<script>
    // ANAHTARINI AŞAĞIDAKİ TIRNAKLARIN İÇİNE YAPIŞTIR
    const API_KEY = "BURAYA_API_KEY_GELECEK"; 

    async function bootJarvis() {
        const box = document.getElementById('userInput');
        const flow = document.getElementById('chat-flow');
        const text = box.value.trim();

        if (!text || API_KEY.includes("BURAYA")) return;

        // Kullanıcı mesajı
        flow.innerHTML += `<div class="bubble user">${text}</div>`;
        box.value = '';
        flow.scrollTop = flow.scrollHeight;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Sen Jarvis'sin. Efendin Yavuz Selim'e kısa ve teknolojik cevaplar ver. Soru: ${text}` }] }]
                })
            });

            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;

            flow.innerHTML += `<div class="bubble jarvis">${reply}</div>`;
            flow.scrollTop = flow.scrollHeight;
        } catch (e) {
            flow.innerHTML += `<div class="bubble jarvis" style="color:red">Bağlantı hatası!</div>`;
        }
    }
</script>

</body>
</html>
