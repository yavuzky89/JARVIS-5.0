<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Integrated AI</title>
    <style>
        :root {
            --glow-color: #00d4ff;
            --bg-color: #050505;
        }

        body {
            background-color: var(--bg-color);
            color: var(--glow-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Fütüristik Arka Plan */
        .background-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        /* API Ayar Paneli */
        .api-config {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 212, 255, 0.1);
            padding: 10px;
            border: 1px solid var(--glow-color);
            border-radius: 5px;
            z-index: 100;
        }

        .api-config input {
            background: black;
            color: white;
            border: 1px solid var(--glow-color);
            padding: 5px;
            font-size: 12px;
            width: 150px;
        }

        /* Mesaj Penceresi */
        #chat-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 10px;
            line-height: 1.5;
            font-size: 15px;
        }

        .user-msg {
            align-self: flex-end;
            background: rgba(0, 212, 255, 0.2);
            border-right: 4px solid var(--glow-color);
            color: white;
        }

        .jarvis-msg {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--glow-color);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.1);
        }

        /* Giriş Alanı */
        .input-bar {
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border-top: 1px solid var(--glow-color);
            display: flex;
            gap: 10px;
        }

        input#userInput {
            flex-grow: 1;
            background: transparent;
            border: 1px solid var(--glow-color);
            padding: 12px;
            color: white;
            border-radius: 5px;
            outline: none;
        }

        button {
            background: var(--glow-color);
            color: black;
            border: none;
            padding: 0 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: 0 0 15px var(--glow-color);
        }

        /* Yükleniyor Animasyonu */
        .typing {
            font-style: italic;
            opacity: 0.7;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="background-overlay"></div>

<div class="api-config">
    <label style="font-size: 10px; display: block;">SİSTEM ANAHTARI (Gemini API)</label>
    <input type="password" id="apiKey" placeholder="API Key Yapıştırın...">
</div>

<div id="chat-container">
    <div class="message jarvis-msg">Sistem çevrimiçi. Emirlerinizi bekliyorum efendim.</div>
</div>

<div class="input-bar">
    <input type="text" id="userInput" placeholder="Jarvis'e bir talimat verin..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button onclick="sendMessage()">İLET</button>
</div>

<script>
    async function sendMessage() {
        const apiKey = document.getElementById('apiKey').value;
        const input = document.getElementById('userInput');
        const chatContainer = document.getElementById('chat-container');
        const userText = input.value.trim();

        if (!apiKey) {
            alert("Lütfen önce API anahtarınızı sol üstteki kutuya girin!");
            return;
        }
        if (!userText) return;

        // Kullanıcı Mesajını Ekle
        addMessage(userText, 'user-msg');
        input.value = '';

        // Jarvis İşliyor Mesajı
        const loadingId = 'loading-' + Date.now();
        addMessage('Jarvis analiz ediyor...', 'jarvis-msg', loadingId);
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `Sen Tony Stark'ın yardımcısı Jarvis'sin. Bana 'efendim' diye hitap et. Çok kısa, zeki ve fütüristik cevaplar ver. Soru: ${userText}` }]
                    }]
                })
            });

            const data = await response.json();
            const aiResponse = data.candidates[0].content.parts[0].text;

            // Yükleniyor yazısını kaldır ve cevabı yaz
            document.getElementById(loadingId).remove();
            addMessage(aiResponse, 'jarvis-msg');

        } catch (error) {
            document.getElementById(loadingId).innerText = "Hata: Sistem bağlantısı kesildi. Anahtarı kontrol edin.";
            console.error(error);
        }
    }

    function addMessage(text, className, id = null) {
        const div = document.createElement('div');
        div.className = `message ${className}`;
        if (id) div.id = id;
        div.innerText = text;
        const container = document.getElementById('chat-container');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>

</body>
</html>
