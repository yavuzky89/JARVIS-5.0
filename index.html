<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS v2.0 - Yavuz Selim</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; 
            color: #00d4ff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        /* Fütüristik HUD */
        .hud-header {
            padding: 20px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            background: rgba(0, 212, 255, 0.05);
            text-align: center;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }

        /* Mesaj Alanı */
        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user {
            align-self: flex-end;
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid #00d4ff;
            color: #fff;
            border-bottom-right-radius: 2px;
        }

        .jarvis {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #00d4ff;
            border-bottom-left-radius: 2px;
        }

        /* Giriş Alanı */
        .input-container {
            padding: 20px;
            background: #080808;
            border-top: 1px solid rgba(0, 212, 255, 0.2);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #111;
            border: 1px solid rgba(0, 212, 255, 0.5);
            color: #fff;
            padding: 12px 18px;
            border-radius: 30px;
            outline: none;
            font-size: 16px;
        }

        input:focus { border-color: #00d4ff; box-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }

        button {
            background: #00d4ff;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        button:active { transform: scale(0.9); }

        .error { color: #ff4444; border-color: #ff4444; }
    </style>
</head>
<body>

<div class="hud-header">Jarvis Tactical Interface | Secure Link</div>

<div id="chat-flow">
    <div class="bubble jarvis">Sistem hazır. Bir emir bekliyorum efendim.</div>
</div>

<div class="input-container">
    <input type="text" id="userInput" placeholder="Mesajınızı buraya yazın..." autocomplete="off">
    <button onclick="askJarvis()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
</div>

<script>
    // BURAYA KENDİ API ANAHTARINI YAPIŞTIR
    const API_KEY = "AIzaSyATD2uwdKKeTpXu4-mVIOBl8e8sX7JD5qQ"; 

    const input = document.getElementById('userInput');
    const flow = document.getElementById('chat-flow');

    // Enter tuşu ile gönderme
    input.addEventListener("keypress", (e) => { if (e.key === "Enter") askJarvis(); });

    async function askJarvis() {
        const message = input.value.trim();
        if (!message) return;

        if (API_KEY === "API_KEY_BURAYA") {
            addMessage("Hata: Kodun içindeki API_KEY kısmını doldurmadınız!", "jarvis error");
            return;
        }

        // Kullanıcı mesajını bas
        addMessage(message, "user");
        input.value = "";

        // Yükleniyor mesajı
        const loadingId = "load-" + Date.now();
        addMessage("Jarvis analiz ediyor...", "jarvis", loadingId);

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Sen Jarvis'sin. Efendin Yavuz Selim'e kısa, zeki ve fütüristik cevaplar ver. Soru: ${message}` }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                document.getElementById(loadingId).innerText = "Sistem Hatası: " + data.error.message;
                document.getElementById(loadingId).classList.add("error");
            } else {
                const reply = data.candidates[0].content.parts[0].text;
                document.getElementById(loadingId).innerText = reply;
            }

        } catch (err) {
            document.getElementById(loadingId).innerText = "Bağlantı kesildi. Lütfen ağ ayarlarını kontrol edin.";
            document.getElementById(loadingId).classList.add("error");
        }

        flow.scrollTop = flow.scrollHeight;
    }

    function addMessage(text, type, id = null) {
        const div = document.createElement("div");
        div.className = "bubble " + type;
        if (id) div.id = id;
        div.innerText = text;
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }
</script>

</body>
</html>
