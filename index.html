<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS v2.1</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #00d4ff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 10px; border-radius: 10px; font-size: 14px; }
        .user { align-self: flex-end; background: #00d4ff22; border: 1px solid #00d4ff; }
        .jarvis { align-self: flex-start; background: #111; border-left: 3px solid #00d4ff; }
        .input-container { padding: 15px; display: flex; gap: 5px; background: #080808; }
        input { flex: 1; background: #111; border: 1px solid #00d4ff; color: #fff; padding: 10px; border-radius: 5px; }
        button { background: #00d4ff; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; }
        .error { color: #ff4444; border: 1px solid #ff4444; }
    </style>
</head>
<body>

<div id="chat-flow"><div class="bubble jarvis">Sistem aktif.</div></div>

<div class="input-container">
    <input type="text" id="userInput" placeholder="Mesaj...">
    <button onclick="ask()">GÖNDER</button>
</div>

<script>
    // BURAYA ANAHTARINI YAPIŞTIR
    const API_KEY = "AIzaSyATD2uwdKKeTpXu4-mVIOBl8e8sX7JD5qQ"; 

    async function ask() {
        const input = document.getElementById('userInput');
        const flow = document.getElementById('chat-flow');
        const text = input.value.trim();
        if (!text) return;

        flow.innerHTML += `<div class="bubble user">${text}</div>`;
        input.value = "";
        
        const loadId = "L-" + Date.now();
        flow.innerHTML += `<div class="bubble jarvis" id="${loadId}">Jarvis işliyor...</div>`;

        try {
            // URL yapısını V1 ve model ismini sadeleştirerek güncelledim
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Sen Jarvis'sin. Çok kısa cevap ver. Soru: ${text}` }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                document.getElementById(loadId).innerHTML = "HATA: " + data.error.message + " (Kod: " + data.error.code + ")";
                document.getElementById(loadId).className += " error";
            } else {
                const reply = data.candidates[0].content.parts[0].text;
                document.getElementById(loadId).innerText = reply;
            }
        } catch (err) {
            document.getElementById(loadId).innerText = "BAĞLANTI HATASI!";
        }
        flow.scrollTop = flow.scrollHeight;
    }
</script>
</body>
</html>
