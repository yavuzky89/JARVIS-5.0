<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS v2.0 - Yavuz Selim</title>
    <style>
        /* CSS BURADA */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #00d4ff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .hud-header { padding: 15px; border-bottom: 1px solid rgba(0, 212, 255, 0.3); background: rgba(0, 212, 255, 0.05); text-align: center; font-size: 10px; letter-spacing: 2px; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 85%; padding: 12px; border-radius: 10px; font-size: 15px; line-height: 1.4; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: rgba(0, 212, 255, 0.1); border: 1px solid #00d4ff; color: #fff; }
        .jarvis { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border-left: 3px solid #00d4ff; }
        .input-container { padding: 15px; background: #080808; border-top: 1px solid rgba(0, 212, 255, 0.2); display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid #00d4ff55; color: #fff; padding: 12px; border-radius: 25px; outline: none; }
        button { background: #00d4ff; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-weight: bold; color: black; }
        .error { color: #ff4444 !important; border-color: #ff4444 !important; }
    </style>
</head>
<body>

<div class="hud-header">JARVIS TACTICAL OS | USER: YAVUZ SELIM</div>

<div id="chat-flow">
    <div class="bubble jarvis">Sistem hazır, bağlantı bekleniyor.</div>
</div>

<div class="input-container">
    <input type="text" id="userInput" placeholder="Emredin efendim..." autocomplete="off">
    <button onclick="askJarvis()">></button>
</div>

<script>
    /* JAVASCRIPT BURADA */
    
    // BURADAKİ TIRNAK İÇİNE API KEY'İNİ YAPIŞTIR
    const API_KEY = "AIzaSyATD2uwdKKeTpXu4-mVIOBl8e8sX7JD5qQ"; 

    const input = document.getElementById('userInput');
    const flow = document.getElementById('chat-flow');

    input.addEventListener("keypress", (e) => { if (e.key === "Enter") askJarvis(); });

    async function askJarvis() {
        const message = input.value.trim();
        if (!message) return;

        // Kullanıcı mesajı
        addMessage(message, "user");
        input.value = "";

        // Jarvis İşliyor (Yükleniyor)
        const loadingId = "id-" + Date.now();
        addMessage("Jarvis analiz ediyor...", "jarvis", loadingId);

        try {
            // Model ve versiyon hatası almamak için en stabil URL:
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Sen Tony Stark'ın yardımcısı Jarvis'sin. Efendin Yavuz Selim'e kısa, zeki ve fütüristik cevaplar ver. Soru: ${message}` }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                document.getElementById(loadingId).innerText = "Hata: " + data.error.message;
                document.getElementById(loadingId).classList.add("error");
            } else {
                const reply = data.candidates[0].content.parts[0].text;
                document.getElementById(loadingId).innerText = reply;
            }

        } catch (err) {
            document.getElementById(loadingId).innerText = "Bağlantı kesildi.";
            document.getElementById(loadingId).classList.add("error");
        }
        flow.scrollTop = flow.scrollHeight;
    }

    function addMessage(text, type, id = null) {
        const div = document.createElement("div");
        div.className = "bubble " + type;
        if (id) div.id = id;
        div.innerText = text;
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }
</script>

</body>
</html>
